<!DOCTYPE html>
<html>
<head>
    <title>Web AI - Văn Lang</title>
    <style>
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .container {
            width: 100vw;       
            height: 100vh;     
            display: flex;
            flex-direction: column;
            align-items: center;  
            background: white;
            padding: 40px;      
            box-sizing: border-box; 
            overflow-y: auto;   
        }

        img {
            width: 150px;
            margin-bottom: 10px;
        }

        h2 {
            margin: 10px 0;
        }

   
        .input-group {
            width: 100%;
            max-width: 800px;  
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        input {
            flex: 1;           
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            padding: 0 25px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover {
            background: #0056b3;
        }

     
        #chatbox {
            width: 100%;
            max-width: 800px;    
            margin-top: 30px;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .user {
            color: #0056b3;
            background: #e7f3ff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .bot {
            color: #1e7e34;
            background: #f0fff4;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="{{ url_for('static', filename='photo.png') }}" alt="Logo Văn Lang">
    <h2>🤖 Web AI Chatbot</h2>
    <p>Đồ Án Cuối Kỳ - Đại học Văn Lang</p>

    <div class="input-group">
        <input type="text" id="message" placeholder="Nhập câu hỏi tại đây...">
        <button onclick="sendMessage()">Gửi</button>
    </div>

    <div id="chatbox"></div>
</div>

<script>
async function sendMessage() {
    let messageInput = document.getElementById("message");
    let message = messageInput.value.trim(); 
    
    if(!message) return; 

    let chatbox = document.getElementById("chatbox");
    

    chatbox.innerHTML += `<div class="user"><b>Bạn:</b> ${message}</div>`;

    messageInput.value = ""; 

    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        let data = await res.json();
        
        chatbox.innerHTML += `<div class="bot"><b>AI:</b> ${data.reply}</div>`;
        
        let container = document.querySelector(".container");
        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });

    } catch (error) {
        console.error("Lỗi kết nối:", error);
        chatbox.innerHTML += `<div class="bot" style="color: red;"><b>Lỗi:</b> Không thể kết nối với server!</div>`;
    }
}

document.getElementById("message").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault(); 
        sendMessage();
    }
});
</script>

</body>
</html>
